info:
  name: Get All Countries and their Details
  type: http
  seq: 1

http:
  method: GET
  url: https://countries.dev/countries?fields=name,capital,alpha2Code,alpha3Code
  params:
    - name: fields
      value: name,capital,alpha2Code,alpha3Code
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

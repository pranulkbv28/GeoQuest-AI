info:
  name: Get Categories by ID
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/categories/byID/zkjbuqa4cqypzz2guf60yqvp"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = res.body;

        test("Status code is 200", () => {
          expect(res.getStatus()).to.equal(200);
        });

        test("Category contains expected fields", () => {
          expect(body).to.have.property("id");
          expect(body).to.have.property("name");
          expect(body).to.have.property("categoryBlob");
          expect(body).to.have.property("createdAt");
          expect(body).to.have.property("updatedAt");
        });

        test("Category name is not empty", () => {
          expect(body.name.length).to.be.greaterThan(0);
        });

        test("Category blob is not empty", () => {
          expect(body.categoryBlob.length).to.be.greaterThan(0);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

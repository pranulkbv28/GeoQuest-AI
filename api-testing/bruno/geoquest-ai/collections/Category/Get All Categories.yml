info:
  name: Get All Categories
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/categories"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = res.body;

        test("Status code is 200", () => {
          expect(res.getStatus()).to.equal(200);
        });

        test("Categories is an array", () => {
          expect(body.categories).to.be.an("array");
        });

        test("Count matches array length", () => {
          expect(body.count).to.equal(body.categories.length);
        });

        test("At least 5 categories exist", () => {
          expect(body.count).to.be.at.least(5);
        });

        test("Categories has expected fields", () => {
          const first = body.categories[0];
          expect(first).to.have.property("id");
          expect(first).to.have.property("name");
          expect(first).to.have.property("categorySlug");
          expect(first).to.have.property("createdAt");
          expect(first).to.have.property("updatedAt");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

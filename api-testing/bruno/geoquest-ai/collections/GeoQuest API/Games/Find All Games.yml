info:
  name: Find All Games
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/games"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = res.getBody();

        test("Status should be 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("Response should have a game property and it should be an array", function () {
          expect(body.games).to.exist;
          expect(body.games).to.be.an("array");
        });

        test("If games exist, the first place should have the expected fields", function () {
          if (body.games.length === 0) {
            return;
          }

          expect(body.games[0]).to.have.property("gameId");
          expect(body.games[0]).to.have.property("gameMode");
          expect(body.games[0]).to.have.property("gameStatus");
          expect(body.games[0]).to.have.property("createdAt");
        });

        test("Response should have games count", function() {
          expect(body.count).to.exist;
        })

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

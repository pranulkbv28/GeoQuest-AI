info:
  name: Get Health
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/health"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("Status should be 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("Health status should be ok", function () {
          const body = res.getBody();

          expect(body.status).to.equal("ok");
        });

        test("Response should contain message", function () {
          const body = res.getBody();

          expect(body.message).to.exist;
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

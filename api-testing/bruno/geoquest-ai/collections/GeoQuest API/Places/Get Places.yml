info:
  name: Get Places
  type: http
  seq: 1

http:
  method: GET
  url: ""
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = res.getBody();

        test("Status should be 200", function () {
          expect(res.getStatus()).to.equal(200);
        });

        test("Response should be an array", function () {
          expect(body).to.be.an("array");
        });

        test("If places exist, the first place should have the expected fields", function () {
          if (body.length === 0) {
            return;
          }

          expect(body[0]).to.have.property("id");
          expect(body[0]).to.have.property("name");
          expect(body[0]).to.have.property("city");
          expect(body[0]).to.have.property("category");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

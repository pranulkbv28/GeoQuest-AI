info:
  name: Update Question
  type: http
  seq: 5

http:
  method: PATCH
  url: "{{baseUrl}}/questions/llppgrq5yb1fr1mwfebd556b"
  body:
    type: json
    data: |-
      {
        "question": "Who was the first Indian to go to space?",
        "categorySlug": "countries-and-continents",
        "isoCode": "IND",
        "questionType": "MULTIPLE_CHOICE",
        "options": ["Rakesh Sharma", "Kalpana Chawla", "Rakesh Dhawan", "DR. APJ Abdul Kalam"],
        "answer": "Rakesh Sharma"
      }
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = res.body;

        test("Status code is 200", () => {
          expect(res.getStatus()).to.equal(200);
        });

        test("Questions has expected fields", () => {
          expect(body).to.have.property("id");
          expect(body).to.have.property("question");
          expect(body).to.have.property("questionImageUrl");
          expect(body).to.have.property("questionType");
          expect(body).to.have.property("options");
          expect(body).to.have.property("category");
          expect(body).to.have.property("country");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

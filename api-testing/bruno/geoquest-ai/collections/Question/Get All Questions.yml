info:
  name: Get All Questions
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/questions"
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        const body = res.body;

        test("Status code is 200", () => {
          expect(res.getStatus()).to.equal(200);
        });

        test("Questions is an array", () => {
          expect(body.questions).to.be.an("array");
        });

        test("Count matches array length", () => {
          expect(body.count).to.equal(body.questions.length);
        });

        test("At least 25 questions exist", () => {
          expect(body.count).to.be.at.least(25);
        });

        test("Questions has expected fields", () => {
          const first = body.questions[0];
          expect(first).to.have.property("id");
          expect(first).to.have.property("question");
          expect(first).to.have.property("questionImageUrl");
          expect(first).to.have.property("questionType");
          expect(first).to.have.property("options");
          expect(first).to.have.property("category");
          expect(first).to.have.property("country");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
